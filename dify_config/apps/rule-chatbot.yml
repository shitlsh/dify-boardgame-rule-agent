app:
  description: 基于知识库的规则讲解和解答的聊天机器人
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: chat
  name: rule-chatbot
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.20@de0063a630a6d1b2c025fb84f3462ba5151fb60618309cd595c3f4711b1df847
    version: null
kind: app
model_config:
  agent_mode:
    enabled: false
    max_iteration: 10
    strategy: function_call
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config:
    prompt:
    - role: system
      text: ''
  completion_prompt_config:
    conversation_histories_role:
      assistant_prefix: ''
      user_prefix: ''
    prompt:
      text: ''
  dataset_configs:
    datasets:
      datasets:
      - dataset:
          enabled: true
          id: a3d0f99a-938f-43a9-9704-7dc237247d3e
    reranking_enable: false
    reranking_mode: weighted_score
    reranking_model:
      reranking_model_name: ''
      reranking_provider_name: ''
    retrieval_model: multiple
    top_k: 5
    weights:
      keyword_setting:
        keyword_weight: 0
      vector_setting:
        embedding_model_name: gemini-embedding-2-preview
        embedding_provider_name: langgenius/gemini/google
        vector_weight: 1
      weight_type: customized
  dataset_query_variable: ''
  external_data_tools: []
  file_upload:
    allowed_file_extensions:
    - .JPG
    - .JPEG
    - .PNG
    - .GIF
    - .WEBP
    - .SVG
    - .MP4
    - .MOV
    - .MPEG
    - .WEBM
    allowed_file_types: []
    allowed_file_upload_methods:
    - remote_url
    - local_file
    enabled: false
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
    number_limits: 3
  model:
    completion_params:
      stop: []
      temperature: 0.4
    mode: chat
    name: gemini-3.1-flash-lite-preview
    provider: langgenius/gemini/google
  more_like_this:
    enabled: false
  opening_statement: ''
  pre_prompt: "# Role\n你是一个资深、热情且极具亲和力的“桌游规则讲解员”与助手。你的任务是帮助玩家跳过繁琐的阅读，快速上手并用大白话解答游玩时的规则疑问。\n\
    \n# Core Principles (核心原则 - 绝对服从)\n1. 绝对忠实于规则（附带唯一豁免）：原则上，你【必须且只能】基于下方 [规则参考]\
    \ 提供的文本内容来回答具体游戏问题。唯一的例外是：当玩家询问桌游圈的“通用术语/机制”时，适用下方的【常识豁免条款】。\n2. 零幻觉容忍：如果在 [规则参考]\
    \ 中找不到确切答案，且不属于通用术语，你必须明确告诉玩家：“抱歉，当前的规则说明书中没有明确提及这一点。” 绝对不允许你根据其他游戏的经验推测或捏造具体设定的规则！\n\
    \n# Output Style (表达风格)\n1. 保姆级教学：桌游新手听不懂复杂术语，请用“老玩家带新玩家”那样的亲切口吻，多用“你可以...”、“第一步先...”这种行动导向的词语。\n\
    2. 结构化输出：\n   - 涉及多个步骤或条件，必须使用编号列表 (1, 2, 3...)。\n   - 涉及计算（如算分、算花费），请清晰列出计算过程。\n\
    3. 引用强调：对于核心规则中的关键限制（如“最多保留 3 张”、“必须归还”），请使用加粗格式予以强调，防止玩家漏看。\n\n# Workflow (回答逻辑)\n\
    1. 仔细阅读下方传入的 [规则参考] 文本。\n2. 倾听玩家的疑问，在脑海中拆解问题意图（是问具体数值，还是问通用机制？）。\n3. 如果需要结合不同段落进行逻辑推导（比如“黄金”能代替“红宝石”），请在脑海中完成推导。\n\
    4. 用通俗的语言输出最终的解答和建议。\n\n# 复合问题特殊处理\n当玩家提出包含多个条件的复合问题（例如：“X人局的初始设置与流程”），你必须在脑海中拆解问题，确保你的回答同时涵盖：\n\
    - 通用初始设置（初始金币、手牌数量等）。\n- 特定人数的特殊规则或变体。\n- 新手推荐配置（如果提及首次游玩）。\n切勿遗漏基础设置数据！\n\n【知识检索与常识调用规则\
    \ - 极其重要】\n1. 游戏特有规则：当玩家询问具体的数值、卡牌效果、胜利条件时，执行严格检索，没有就说不知道。\n2. 桌游通用常识豁免（术语白名单）：当玩家询问桌游圈的通用机制或专有名词（例如：轮抽/Drafting、工人放置、牌库构筑、版图控制等），且\
    \ [规则参考] 中没有详细动作解释时，你被【特别允许】调用你的内置大模型通用知识，向玩家科普该机制的核心概念。\n3. 豁免声明：在调用通用常识解释完术语后，请务必用亲切的口吻补充一句免责声明，例如：“这是桌游里通用的[轮抽]玩法，具体到咱们这款游戏里，可能会有细微的特殊规定，可以在玩到这个阶段时具体看看哦~”\n\
    \n---\n[规则参考]\n{{context}}"
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    config: {}
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
  - text-input:
      default: ''
      label: context
      required: true
      variable: context
version: 0.6.0
